name: CI — Build & Route Integrity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Reproducible installs — fail if package.json / lockfile drift
      - name: Install dependencies (frozen lockfile)
        run: npm ci

      # Guards: missing modules, route mismatches, full vite build
      - name: Run CI validation pipeline
        run: node scripts/ci-validate.mjs

      # Upload built artefact so reviewers can inspect output if needed
      - name: Upload dist/
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
